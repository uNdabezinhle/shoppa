name: shoppa_app
description: "Shoppa — mobile app and (via the web target) admin console."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.7
  share_plus: ^10.0.0
  wakelock_plus: ^1.2.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
