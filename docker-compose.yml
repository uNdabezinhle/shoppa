# Local staging stack for Sprint 0+ development.
# Usage: docker compose up -d redis postgres
#        cd backend && python manage.py migrate && python manage.py seed_launch_data
#        celery -A shoppa_api worker -l info   (separate terminal)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shoppa
      POSTGRES_USER: shoppa
      POSTGRES_PASSWORD: shoppa
    ports:
      - "5432:5432"
    volumes:
      - shoppa_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,api
    depends_on:
      - postgres
      - redis

  celery-worker:
    build: ./backend
    command: celery -A shoppa_api worker -l info
    environment:
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: ./backend
    command: celery -A shoppa_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  shoppa_pgdata: