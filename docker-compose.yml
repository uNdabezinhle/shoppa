# Full local stack — Postgres, Redis, API (Daphne), Celery worker + beat.
#
# Quick start:
#   docker compose up -d --build
#   curl http://localhost:8000/v1/health/
#
# Flutter (Android emulator):
#   flutter run --dart-define=API_BASE_URL=http://10.0.2.2:8000/v1
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shoppa
      POSTGRES_USER: shoppa
      POSTGRES_PASSWORD: shoppa
    ports:
      - "5432:5432"
    volumes:
      - shoppa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoppa -d shoppa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,api,testserver
      SEED_LAUNCH_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  celery-worker:
    build: ./backend
    command: celery -A shoppa_api worker -l info
    environment:
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
      SEED_LAUNCH_DATA: "false"
    depends_on:
      api:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A shoppa_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      SECRET_KEY: dev-compose-key
      DATABASE_URL: postgres://shoppa:shoppa@postgres:5432/shoppa
      REDIS_URL: redis://redis:6379/0
      SEED_LAUNCH_DATA: "false"
    depends_on:
      api:
        condition: service_healthy

volumes:
  shoppa_pgdata: